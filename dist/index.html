<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness web app</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;700&display=swap" rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
      integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm"
      crossorigin="anonymous"
    />

    <link href="output.css" rel="stylesheet" />
  </head>
  <body>
    <div class="fixed z-20 inset-0 overflow-y-auto duration-300 hidden opacity-0" aria-labelledby="modal-title" role="dialog" aria-modal="true" id="thismodal">
      <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        <div
          class="
            inline-block
            align-bottom
            bg-white
            rounded-lg
            text-left
            overflow-hidden
            shadow-xl
            transform
            transition-all
            sm:my-8 sm:align-middle sm:max-w-lg sm:w-full
          "
        >
          <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
            <div class="sm:flex sm:items-start">
              <div class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-red-100 sm:mx-0 sm:h-10 sm:w-10">
                <svg class="h-6 w-6 text-red-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                  />
                </svg>
              </div>
              <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
                <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">Deactivate account</h3>
                <div class="mt-2">
                  <p class="text-sm text-gray-500">
                    Are you sure you want to deactivate your account? All of your data will be permanently removed. This action cannot be undone.
                  </p>
                </div>
              </div>
            </div>
          </div>
          <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
            <button
              type="button"
              class="
                w-full
                inline-flex
                justify-center
                rounded-md
                border border-transparent
                shadow-sm
                px-4
                py-2
                bg-red-600
                text-base
                font-medium
                text-white
                hover:bg-red-700
                focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500
                sm:ml-3 sm:w-auto sm:text-sm
              "
            >
              Deactivate
            </button>
            <button
              type="button"
              class="
                mt-3
                w-full
                inline-flex
                justify-center
                rounded-md
                border border-gray-300
                shadow-sm
                px-4
                py-2
                bg-white
                text-base
                font-medium
                text-gray-700
                hover:bg-gray-50
                focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500
                sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm
              "
              onclick="UI.ANIMATIONS.hideModal(document.getElementById('thismodal'))"
            >
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
    <nav class="flex items-center justify-between flex-wrap bg-slate-50">
      <div class="flex items-center flex-shrink-0 text-black mr-6 ml-5">
        <span class="font-semibold text-6xl tracking-tight">FitNit</span>
      </div>
      <div class="block lg:hidden">
        <button class="flex items-center px-3 py-2 border rounded text-black border-gray-400 hover:border-gray-600 main-dropdown-button mr-10">
          <svg class="fill-current h-3 w-3" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <title>Menu</title>
            <path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z" />
          </svg>
        </button>
      </div>
      <div class="w-full block flex-grow lg:flex lg:items-center lg:w-auto bg-inherit">
        <div class="hidden lg:block bg-inherit absolute lg:static w-full lg:w-auto ml-auto mr-10 z-10" id="main-dropdown">
          <ul class="main-dropdown-ul flex lg:gap-10 flex-col lg:flex-row shadow-lg lg:shadow-none">
            <li class="hover:text-blue-400 cursor-pointer whitespace-nowrap mx-auto my-2.5 lg:m-0 selected">Home</li>
            <li class="hover:text-blue-400 cursor-pointer whitespace-nowrap mx-auto my-2.5 lg:m-0">How to use</li>
            <li class="hover:text-blue-400 cursor-pointer whitespace-nowrap mx-auto my-2.5 lg:m-0">Trending workouts</li>
            <li class="hover:text-blue-400 cursor-pointer whitespace-nowrap mx-auto my-2.5 lg:m-0">Donate</li>
            <li class="hover:text-blue-400 cursor-pointer whitespace-nowrap mx-auto my-2.5 lg:m-0">Post your own workout</li>
            <button
              class="px-4 py-2 leading-none border rounded text-black border-black hover:border-transparent hover:text-white hover:bg-blue-400 m-4 lg:m-0"
            >
              Login / Signup
            </button>
            <hr class="bg-blue-400 hidden lg:block navbar-hr" />
          </ul>
          <div></div>
        </div>
      </div>
    </nav>
    <div class="current-page">
      <div class="main-app flex">
        <div class="timer-section w-full lg:w-3/4">
          <h2 class="text-4xl font-bold text-center select-none mt-auto">Current Exercise</h2>
          <h2 class="text-9xl font-bold text-center select-none text-blue-400">60</h2>
          <div class="control-panel mt-auto w-full">
            <div class="bg-blue-400 h-2 w-1/2"></div>
            <div class="flex justify-center p-4 w-full bg-gray-200">
              <button class="main-button text-gray-600 h-12 w-12 rounded-full text-xl mr-auto"><i class="fas fa-random"></i></button>
              <button class="main-button text-blue-400 h-12 w-12 rounded-full text-xl mx-5"><i class="fas fa-backward"></i></button>
              <button class="main-button text-blue-400 bg-gray-600 h-12 w-12 rounded-full text-lg"><i class="fas fa-play"></i></button>
              <button class="main-button text-blue-400 h-12 w-12 rounded-full text-xl mx-5"><i class="fas fa-forward"></i></button>
              <button class="main-button text-gray-600 h-12 w-12 rounded-full text-xl ml-auto"><i class="fas fa-volume-up"></i></button>
            </div>
          </div>
        </div>
        <div class="exercises-section bg-gray-100 w-0 lg:w-1/4 flex flex-row align-center overflow-x-hidden">
          <button class="exercises-section-button outline-none select-none">❱</button>
          <div class="w-full flex flex-col h-full overflow-x-hidden duration-300" id="all-workouts-section">
            <button class="border border-black rounded-full p-2.5 my-6 mx-10 w-auto rainbow-text">
              <span class="text mr-2"><i class="fas fa-plus"></i></span> Add workout
            </button>
            <span class="w-full flex flex-col" id="workouts-container"></span>
          </div>
          <div class="duration-300 overflow-x-hidden w-0" id="single-workout-section">
            <div class="p-2 bg-gradient-to-r from-blue-700 to-cyan-300 text-white flex sticky top-0">
              <button class="ml-3 mr-3" onclick="UI.toggleWorkoutsSection()"><i class="fas fa-arrow-left"></i></button>
              <div class="w-full flex">
                <input type="text" class="bg-transparent outline-none px-2 rounded w-full" id="change-workout-name-input" readonly />
                <button class="ml-2 outline-none bg-gray-200 text-gray-900 text-sm py-2 px-4 rounded shadow" id="change-workout-name-edit-button">Edit</button>
                <button class="ml-2 outline-none bg-white text-gray-700 text-sm py-2 px-4 rounded shadow hidden" id="change-workout-name-button">Save</button>
              </div>
            </div>
            <div id="single-exercises-section">
              <div class="flex exercise bg-transparent my-2 z-20 translate-y-0">
                <div class="flex flex-col justify-center">
                  <button class="mx-4 text-2xl text-gray-700 upper-arrow-button scale-x-105">
                    <i class="fas fa-caret-up"></i>
                  </button>
                  <button class="mx-4 text-2xl text-gray-700 upper-arrow-button scale-x-105">
                    <i class="fas fa-caret-down"></i>
                  </button>
                </div>
                <button class="bg-white my-3 px-4 py-3 rounded-l-lg mr-0 shadow flex w-full text-left" onclick="UI.selectWorkout('${index}')">
                  <strong class="mr-2 text-lg self-center">1</strong> <span class="text-sm my-auto">Push-ups</span>
                </button>
                <button class="workout-gear-button bg-white mx-0 my-3 px-4 py-3 shadow flex text-blue-500 items-center" onclick="UI.loadWorkout('${index}')">
                  <strong class="mr-2 text-lg self-center">20</strong>
                </button>
                <button
                  class="workout-gear-button bg-white mx-3 my-3 px-4 py-3 rounded-r-lg ml-0 shadow flex text-gray-500 items-center"
                  onclick="UI.loadWorkout('${index}')"
                >
                  <span class="ml-auto text-lg"><i class="fas fa-cog duration-300"></i></span>
                </button>
              </div>

              <div class="flex exercise bg-transparent my-2 z-20 translate-y-0">
                <div class="flex flex-col justify-center">
                  <button class="mx-4 text-2xl text-gray-700 upper-arrow-button scale-x-105">
                    <i class="fas fa-caret-up"></i>
                  </button>
                  <button class="mx-4 text-2xl text-gray-700 upper-arrow-button scale-x-105">
                    <i class="fas fa-caret-down"></i>
                  </button>
                </div>
                <button class="bg-white my-3 px-4 py-3 rounded-l-lg mr-0 shadow flex w-full text-left" onclick="UI.selectWorkout('${index}')">
                  <strong class="mr-2 text-lg self-center">2</strong> <span class="text-sm my-auto">Arm circles</span>
                </button>
                <button class="workout-gear-button bg-white mx-0 my-3 px-4 py-3 shadow flex text-blue-500 items-center" onclick="UI.loadWorkout('${index}')">
                  <strong class="mr-2 text-lg self-center">60</strong>
                </button>
                <button
                  class="workout-gear-button bg-white mx-3 my-3 px-4 py-3 rounded-r-lg ml-0 shadow flex text-gray-500 items-center"
                  onclick="UI.loadWorkout('${index}')"
                >
                  <span class="ml-auto text-lg"><i class="fas fa-cog duration-300"></i></span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="./main.js" type="module"></script>
  </body>
</html>
