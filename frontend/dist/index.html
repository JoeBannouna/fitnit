<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness web app</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;700&display=swap" rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
      integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm"
      crossorigin="anonymous"
    />

    <link href="output.css" rel="stylesheet" />
  </head>
  <body>
    <div class="loading-screen flex justify-center items-center w-screen h-screen bg-blue-400 z-[60] absolute text-white">
      <div class="loading-screen-content hidden">
        <div class="flex justify-center items-center">
          <h2 class="text-6xl font-bold animate-[sideSlide_1s_ease-in-out] overflow-hidden p-3">Loading</h2>
          <svg class="animate-spin ml-3 h-20 w-20 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
          <!-- <img src="/assets/logos/logo1.png" alt="Logo" class="h-28 w-28 m-4 animate-spin" /> -->
        </div>
      </div>
    </div>

    <span id="modal-container"></span>
    <span id="alert-container"></span>

    <nav class="flex items-center justify-between flex-wrap bg-slate-50">
      <div class="flex items-center flex-shrink-0 text-black mr-6 ml-5">
        <span class="font-semibold text-6xl tracking-tight">FitNit</span>
      </div>
      <div class="block lg:hidden">
        <button class="flex items-center px-3 py-2 border rounded text-black border-gray-400 hover:border-gray-600 main-dropdown-button mr-10">
          <svg class="fill-current h-3 w-3" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <title>Menu</title>
            <path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z" />
          </svg>
        </button>
      </div>
      <div class="w-full block flex-grow lg:flex lg:items-center lg:w-auto bg-inherit">
        <div class="hidden lg:block bg-inherit absolute lg:static w-full lg:w-auto ml-auto mr-10 z-40" id="main-dropdown">
          <ul class="main-dropdown-ul flex lg:gap-10 flex-col lg:flex-row shadow-lg lg:shadow-none">
            <li class="hover:text-blue-400 cursor-pointer whitespace-nowrap mx-auto my-2.5 lg:m-0 selected">Home</li>
            <li class="hover:text-blue-400 cursor-pointer whitespace-nowrap mx-auto my-2.5 lg:m-0">How to use</li>
            <li class="hover:text-blue-400 cursor-pointer whitespace-nowrap mx-auto my-2.5 lg:m-0">Trending workouts</li>
            <li class="hover:text-blue-400 cursor-pointer whitespace-nowrap mx-auto my-2.5 lg:m-0">Donate</li>
            <li class="hover:text-blue-400 cursor-pointer whitespace-nowrap mx-auto my-2.5 lg:m-0">Post your own workout</li>
            <button
              class="px-4 py-2 leading-none border rounded text-black border-black hover:border-transparent hover:text-white hover:bg-blue-400 m-4 lg:m-0"
            >
              Login / Signup
            </button>
            <hr class="bg-blue-400 hidden lg:block navbar-hr" />
          </ul>
          <div></div>
        </div>
      </div>
    </nav>
    <div class="current-page">
      <div class="main-app flex">
        <div class="timer-section w-full lg:w-3/4 relative overflow-x-hidden" id="timer-section">
          <div class="absolute inset-0 bg-gray-100/30" id="timer-section-cover"></div>
          <h2 class="text-4xl font-bold text-center select-none mt-auto" id="timer-title">Current Exercise</h2>
          <h2 class="text-9xl font-bold text-center select-none text-blue-400 w-full px-20 py-4" id="timer-number">60</h2>
          <div class="now-playing-bar mt-auto w-full">
            <div class="bg-blue-400 h-2 w-1/2"></div>
            <div class="flex justify-center p-4 w-full bg-gray-200">
              <button class="main-button text-gray-600 h-12 w-12 rounded-full text-xl mr-auto"><i class="fas fa-random"></i></button>
              <button class="main-button text-blue-400 h-12 w-12 rounded-full text-xl mx-5" id="prev-button">
                <i class="fas fa-backward"></i>
              </button>
              <button class="main-button text-blue-400 bg-gray-600 h-12 w-12 rounded-full text-lg" id="play-button">
                <i class="fas fa-play"></i>
              </button>
              <button class="main-button text-blue-400 h-12 w-12 rounded-full text-xl mx-5" id="next-button">
                <i class="fas fa-forward"></i>
              </button>
              <button class="main-button text-gray-600 h-12 w-12 rounded-full text-xl ml-auto"><i class="fas fa-volume-up"></i></button>
            </div>
          </div>
        </div>
        <div class="control-panel bg-gray-100 w-0 lg:w-1/4 flex flex-row align-center overflow-x-hidden">
          <button class="control-panel-button outline-none select-none z-20">❱</button>
          <div class="w-full flex flex-col h-full overflow-x-hidden duration-300" id="all-workouts-section">
            <button class="border border-black rounded-full p-2.5 my-6 mx-10 w-auto rainbow-text" id="add-workout-button">
              <span class="text mr-2"><i class="fas fa-plus"></i></span> Add workout
            </button>
            <span class="w-full flex flex-col" id="workouts-container"></span>
          </div>
          <div class="duration-300 overflow-x-hidden w-0" id="single-workout-section">
            <div class="p-2 bg-gradient-to-r from-blue-700 to-cyan-300 text-white flex sticky top-0 z-30">
              <button class="ml-3 mr-3" id="workout-back-button"><i class="fas fa-arrow-left"></i></button>
              <form class="w-full flex" id="change-workout-name-form">
                <input type="text" class="bg-transparent outline-none px-2 rounded w-full" id="change-workout-name-input" readonly required />
                <button class="ml-2 outline-none bg-gray-200 text-gray-900 text-sm py-2 px-4 rounded shadow" id="change-workout-name-edit-button" type="button">
                  Edit
                </button>
                <button class="ml-2 outline-none bg-white text-gray-700 text-sm py-2 px-4 rounded shadow hidden" id="change-workout-name-button" type="submit">
                  Save
                </button>
              </form>
            </div>
            <div class="flex justify-center items-center p-3 mt-2 relative">
              <button class="border border-gray-400 bg-gray-200 rounded-xl p-3" id="rest-button">
                <span class="font-bold">Rest intervals:</span>
                <span id="rest-span"></span>
                <span>seconds</span>
              </button>
              <form class="flex opacity-0 duration-300 absolute top-full bg-white rounded shadow-xl shadow-gray-300 z-30 hidden" id="rest-form">
                <div class="bg-white rounded h-4 w-4 absolute rotate-45 bottom-3/4 right-2/3"></div>
                <input type="number" class="bg-transparent outline-none rounded-l px-4 py-2 w-full" id="rest-input" />
                <button type="submit" class="bg-blue-400 text-white rounded-r px-4 py-2 w-full">Save</button>
              </form>
            </div>
            <div id="single-exercises-section"></div>
            <div class="flex justify-center items-center p-4">
              <button
                class="bg-gradient-to-r from-blue-700 to-cyan-400 hover:from-blue-800 hover:to-cyan-500 text-white px-4 py-2 rounded-lg outline-none w-full"
                id="add-exercise-button"
              >
                <span class="text mr-2"><i class="fas fa-plus"></i></span> Add exercise
              </button>
            </div>
          </div>

          <div class="duration-300 overflow-x-hidden w-0 scroll-smooth" id="selected-workout-section">
            <div class="p-2 bg-gradient-to-r from-purple-700 to-cyan-300 text-white flex sticky top-0 z-30">
              <button class="ml-3 mr-3" id="selected-workout-back-button"><i class="fas fa-arrow-left"></i></button>
              <div class="w-full flex py-1.5">
                <input type="text" class="bg-transparent outline-none px-2 rounded w-full" id="workout-name-input" readonly />
              </div>
            </div>

            <div class="bg-white rounded-lg shadow m-4 p-3 text-sm" id="workout-info-box">
              <div class="leading-7"><span>Number of exercises: </span><span></span></div>
              <div class="leading-7"><span>Estimated completion time: </span><span></span></div>
            </div>

            <div id="selected-exercises-section"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      // document
      //   .querySelectorAll('button')
      //   .forEach(button => (button.onclick = button.onclick !== null ? button.onclick : () => alert("This button doesn't work yet, Sorry!")));
    </script>
    <script src="./main.js" type="module"></script>
  </body>
</html>
